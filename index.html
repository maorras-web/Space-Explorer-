<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Explorer - Ships & Audio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- רקע כוכבים נע -->
        <div class="stars-backdrop"></div>
        <div class="stars-backdrop stars-fast"></div>

        <!-- סרגל ניקוד ומגן עליון -->
        <header>
            <div class="score-board">
                <span>ניקוד: <strong id="score">0</strong></span>
                <span id="shield-status">🛡️ מגן: <strong id="shield-val">אין</strong></span>
                <span>שיא: <strong id="high-score">0</strong></span>
            </div>
        </header>

        <!-- אזור המשחק -->
        <main class="space-viewport" id="viewport">
            <div class="spaceship type-ship1" id="player-ship">
                <div class="shield-aura" id="shield-aura"></div>
                <div class="ship-body"></div>
                <div class="ship-window"></div>
                <div class="thruster-fire"></div>
            </div>
            
            <!-- מסך פתיחה ובחירת חלליות -->
            <div id="start-screen" class="overlay">
                <h1>🚀 Space Explorer</h1>
                <p>בחר חללית והתחל לשחק:</p>
                
                <div class="ship-selector">
                    <div class="ship-card selected" id="card-ship1" onclick="selectShip('ship1')">
                        <div class="ship-preview p-ship1"></div>
                        <span>סייר בסיסי</span>
                        <small class="unlocked-lbl">פתוח</small>
                    </div>

                    <div class="ship-card locked" id="card-ship2" onclick="selectShip('ship2')">
                        <div class="ship-preview p-ship2"></div>
                        <span>פנטום מהיר</span>
                        <small id="req-ship2">משריין ב-200 נק'</small>
                    </div>

                    <div class="ship-card locked" id="card-ship3" onclick="selectShip('ship3')">
                        <div class="ship-preview p-ship3"></div>
                        <span>טיטאן כבד</span>
                        <small id="req-ship3">משריין ב-500 נק'</small>
                    </div>
                </div>

                <button class="game-btn action-start" onclick="startGame()">🚀 התחל משחק</button>
            </div>

            <!-- מסך Game Over -->
            <div id="game-over-overlay" class="overlay hidden">
                <h2>💥 החללית הושמדה!</h2>
                <p>הניקוד שלך: <span id="final-score">0</span></p>
                <button class="game-btn action-start" onclick="showStartScreen()">🔄 לתפריט הראשי</button>
            </div>
        </main>

        <!-- לוח בקרה תחתון -->
        <footer class="control-panel">
            <button class="game-btn action-settings" onclick="toggleSettings()">⚙️ הגדרות</button>
            <button class="game-btn action-start" onclick="showStartScreen()">🏠 תפריט</button>
        </footer>

    </div>

    <!-- חלון הגדרות -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeSettings()">&times;</span>
            <h2>⚙️ הגדרות</h2>
            <div class="settings-options">
                <div class="setting-item">
                    <label for="bg-color-picker">צבע חלל:</label>
                    <input type="color" id="bg-color-picker" value="#050510">
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
