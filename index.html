<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- מסך בית והגדרות -->
        <div id="main-menu" class="overlay">
            <h1>Space Explorer</h1>
            <button id="start-btn" onclick="startGame()">התחל משחק</button>
            <button id="settings-btn" onclick="toggleSettings()">⚙️ הגדרות</button>
        </div>

        <!-- תפריט הגדרות -->
        <div id="settings-menu" class="overlay hidden">
            <h2>הגדרות משחק</h2>
            
            <label>ווליום אפקטים (VFX):</label>
            <input type="range" id="vfx-volume" min="0" max="100" value="80" onchange="updateSettings()">

            <label>רמת קושי:</label>
            <select id="difficulty" onchange="updateSettings()">
                <option value="easy">קל</option>
                <option value="normal" selected>רגיל</option>
                <option value="hard">קשה</option>
            </select>

            <label>חללית ברירת מחדל:</label>
            <select id="default-ship" onchange="updateSettings()">
                <option value="blue">חללית כחולה</option>
                <option value="red">חללית אדומה</option>
                <option value="green">חללית ירוקה</option>
            </select>

            <label>רגישות תזוזה:</label>
            <input type="range" id="sensitivity" min="1" max="10" value="5" onchange="updateSettings()">

            <button onclick="toggleSettings()">חזרה למשחק</button>
        </div>

        <!-- מסך פוסט-בוס / החייאה (Revive) -->
        <div id="revive-screen" class="overlay hidden">
            <h2>נפסלת!</h2>
            <p>רוצה לחזור לחיים עם 100% בריאות?</p>
            <button id="ad-btn" onclick="watchAdAndRevive()">📺 צפה בפרסומת והחיה את החללית</button>
            <button onclick="gameOver()">וותר ותעבור למסך סיום</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
