<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Explorer - Deluxe Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div class="stars-backdrop"></div>
        <div class="stars-backdrop stars-fast"></div>

        <header>
            <div class="score-board">
                <span>ניקוד: <strong id="score">0</strong></span>
                <span id="shield-status">🛡️ מגן: <strong id="shield-val">אין</strong></span>
                <span>שיא: <strong id="high-score">0</strong></span>
            </div>
        </header>

        <main class="space-viewport" id="viewport">
            <div class="spaceship" id="player-ship">
                <div class="shield-aura" id="shield-aura"></div>
                <div class="ship-body"></div>
                <div class="ship-window"></div>
                <div class="thruster-fire"></div>
            </div>
            
            <div id="game-over-overlay" class="overlay hidden">
                <h2>💥 החללית הושמדה!</h2>
                <p>הניקוד הכללי שלך: <span id="final-score">0</span></p>
                <button class="game-btn action-start" onclick="startGame()">🚀 משחק חדש</button>
            </div>
        </main>

        <footer class="control-panel">
            <button class="game-btn action-settings" onclick="toggleSettings()">⚙️ הגדרות</button>
            <button class="game-btn action-start" onclick="startGame()">🚀 התחל</button>
        </footer>

    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeSettings()">&times;</span>
            <h2>⚙️ הגדרות</h2>
            <div class="settings-options">
                <div class="setting-item">
                    <label for="bg-color-picker">צבע חלל:</label>
                    <input type="color" id="bg-color-picker" value="#050510">
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
