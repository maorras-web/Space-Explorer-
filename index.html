<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="stars-backdrop"></div>
        <div class="stars-backdrop stars-fast"></div>

        <header>
            <div class="score-board">
                <span>Score: <span id="score">0</span></span>
                <span>HP: <span id="hp-val">❤️❤️❤️</span></span>
                <span>Shield: <span id="shield-val">None</span></span>
                <span>High Score: <span id="high-score">0</span></span>
                <button id="pause-btn" class="pause-icon-btn" onclick="togglePause()">⏸️</button>
            </div>
        </header>

        <div id="viewport" class="space-viewport">
            <div id="player-ship" class="spaceship type-ship1">
                <div id="shield-aura" class="shield-aura"></div>
                <div class="ship-body"></div>
                <div class="ship-cockpit"></div>
                <div class="wing wing-left"></div>
                <div class="wing wing-right"></div>
                <div class="engine-glow"></div>
                <div class="thruster-fire"></div>
            </div>

            <div id="start-screen" class="overlay">
                <h1>🚀 Space Explorer</h1>
                <p>בחר חללית:</p>
                <div id="ship-selector-container" class="ship-selector"></div>

                <p>בחר נשק התחלתי:</p>
                <div class="weapon-selector">
                    <button class="weapon-btn selected" id="w-single" onclick="selectWeapon('single')">🔫 ירייה יחידה</button>
                    <button class="weapon-btn" id="w-double" onclick="selectWeapon('double')">⚡ ירייה כפולה</button>
                    <button class="weapon-btn" id="w-triple" onclick="selectWeapon('triple')">💥 ירייה משולשת</button>
                </div>

                <button class="game-btn start-btn" onclick="startGame()">🚀 התחל משחק</button>
            </div>

            <div id="pause-modal" class="overlay hidden">
                <h2>⏸️ המשחק מושהה</h2>
                <button class="game-btn" onclick="togglePause()">▶️ המשך משחק</button>
                <button class="game-btn" onclick="showStartScreen()">🔄 לתפריט הראשי</button>
            </div>

            <div id="game-over-overlay" class="overlay hidden">
                <h2>💥 החללית הושמדה!</h2>
                <p>הניקוד שלך: <span id="final-score">0</span></p>
                <button class="game-btn" onclick="showStartScreen()">🔄 לתפריט הראשי</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
