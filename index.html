<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Explorer - English Default v6</title>
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

    <div id="game-container">
        <!-- רקע כוכבים נע -->
        <div class="stars-backdrop"></div>
        <div class="stars-backdrop stars-fast"></div>

        <!-- סרגל ניקוד ומגן עליון -->
        <header>
            <div class="score-board">
                <span><span data-i18n="score">Score</span>: <strong id="score">0</strong></span>
                <span id="shield-status">🛡️ <span data-i18n="shield">Shield</span>: <strong id="shield-val">None</strong></span>
                <span><span data-i18n="highScore">High Score</span>: <strong id="high-score">0</strong></span>
            </div>
        </header>

        <!-- אזור המשחק -->
        <main class="space-viewport" id="viewport">
            <!-- חללית השחקן -->
            <div class="spaceship type-ship1" id="player-ship">
                <div class="shield-aura" id="shield-aura"></div>
                <div class="wing wing-left"></div>
                <div class="wing wing-right"></div>
                <div class="ship-body">
                    <div class="ship-cockpit"></div>
                </div>
                <div class="engine-glow"></div>
                <div class="thruster-fire"></div>
            </div>
            
            <!-- מסך פתיחה ובחירת חלליות -->
            <div id="start-screen" class="overlay">
                <h1 data-i18n="gameTitle">🚀 Space Explorer</h1>
                <p data-i18n="shipSelectionLead">Select an advanced ship to play:</p>
                
                <div class="ship-selector" id="ship-selector-container">
                    <!-- כרטיסי החלליות ייבנו דינמית -->
                </div>

                <button class="game-btn action-start" onclick="startGame()" data-i18n="startBtn">🚀 Start Game</button>
            </div>

            <!-- מסך Game Over -->
            <div id="game-over-overlay" class="overlay hidden">
                <h2 data-i18n="gameOverTitle">💥 Ship Destroyed!</h2>
                <p><span data-i18n="yourScore">Your Score</span>: <span id="final-score">0</span></p>
                <button class="game-btn action-start" onclick="showStartScreen()" data-i18n="mainMenuBtn">🔄 Main Menu</button>
            </div>
        </main>

        <!-- פאנל תחתון -->
        <footer class="control-panel">
            <button class="game-btn action-start" onclick="showStartScreen()" data-i18n="mainMenuBtn">🏠 Main Menu</button>
            <button class="game-btn" onclick="document.getElementById('settings-modal').style.display='block'">⚙️ Settings</button>
        </footer>

    </div>

    <!-- תפריט הגדרות צף -->
    <div id="settings-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#111; border:2px solid #00f0ff; padding:20px; color:#fff; z-index:999; border-radius:8px; text-align:center;">
        <h3>Game Settings</h3>
        <br>
        <label>VFX Volume: <input type="range" id="vfx-slider" min="0" max="1" step="0.1" value="0.25"></label><br><br>
        <button class="game-btn" onclick="document.getElementById('settings-modal').style.display='none'">Close</button>
    </div>

    <!-- מסך החייאה -->
    <div id="revive-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#111; border:2px solid #00ff66; padding:20px; text-align:center; color:#fff; z-index:999; border-radius:8px;">
        <h3>Ship Destroyed!</h3>
        <p>Watch an ad to revive with 100% Shield</p>
        <br>
        <button class="game-btn" onclick="watchAdAndRevive()" style="background:#00a843; margin-bottom:10px;">📺 Revive Now</button><br>
        <button class="game-btn" onclick="skipReviveAndGameOver()">❌ Main Menu</button>
    </div>

    <!-- סקריפט המשחק -->
    <script src="game.js?v=6"></script>
</body>
</html>
