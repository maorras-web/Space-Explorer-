<!DOCTYPE html>
<html lang="en" dir="ltr"> <!-- נקבע קשיח לאנגלית -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Explorer - English Default v6</title>
    <!-- הוספת גרסה חדשה לקובץ ה-CSS -->
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

    <div id="game-container">
        <!-- רקע כוכבים נע -->
        <div class="stars-backdrop"></div>
        <div class="stars-backdrop stars-fast"></div>

        <!-- סרגל ניקוד ומגן עליון -->
        <header>
            <div class="score-board">
                <span><span data-i18n="score">Score</span>: <strong id="score">0</strong></span>
                <span id="shield-status">🛡️ <span data-i18n="shield">Shield</span>: <strong id="shield-val">None</strong></span>
                <span><span data-i18n="highScore">High Score</span>: <strong id="high-score">0</strong></span>
            </div>
        </header>

        <!-- אזור המשחק -->
        <main class="space-viewport" id="viewport">
            <!-- חללית השחקן -->
            <div class="spaceship type-ship1" id="player-ship">
                <div class="shield-aura" id="shield-aura"></div>
                <div class="wing wing-left"></div>
                <div class="wing wing-right"></div>
                <div class="ship-body">
                    <div class="ship-cockpit"></div>
                </div>
                <div class="engine-glow"></div>
                <div class="thruster-fire"></div>
            </div>
            
            <!-- מסך פתיחה ובחירת חלליות -->
            <div id="start-screen" class="overlay">
                <h1 data-i18n="gameTitle">🚀 Space Explorer</h1>
                <p data-i18n="shipSelectionLead">Select an advanced ship to play:</p>
                
                <div class="ship-selector" id="ship-selector-container">
                    <!-- כרטיסי החלליות ייבנו דינמית -->
                </div>

                <button class="game-btn action-start" onclick="startGame()" data-i18n="startBtn">🚀 Start Game</button>
            </div>

            <!-- מסך Game Over -->
            <div id="game-over-overlay" class="overlay hidden">
                <h2 data-i18n="gameOverTitle">💥 Ship Destroyed!</h2>
                <p><span data-i18n="yourScore">Your Score</span>: <span id="final-score">0</span></p>
                <button class="game-btn action-start" onclick="showStartScreen()" data-i18n="mainMenuBtn">🔄 Main Menu</button>
            </div>
        </main>

        <!-- פאנל תחתון -->
        <footer class="control-panel">
            <button class="game-btn action-start" onclick="showStartScreen()" data-i18n="mainMenuBtn">🏠 Main Menu</button>
        </footer>

    </div>

    <!-- הוספת גרסה חדשה לקובץ ה-JS -->
    <script src="game.js?v=6"></script>
</body>
</html>
