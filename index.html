<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Background Stars -->
        <div class="stars-backdrop"></div>
        <div class="stars-backdrop stars-fast"></div>

        <!-- Top Header -->
        <header>
            <div class="score-board">
                <span>Score: <span id="score">0</span></span>
                <span>HP: <span id="hp-val">❤️❤️❤️</span></span>
                <span>Shield: <span id="shield-val">None</span></span>
                <span>High: <span id="high-score">0</span></span>
                <button id="pause-btn" class="pause-icon-btn" onclick="togglePause()">⏸️</button>
            </div>
        </header>

        <!-- Game Viewport -->
        <div id="viewport" class="space-viewport">
            <div id="player-ship" class="spaceship type-ship1">
                <div id="shield-aura" class="shield-aura"></div>
                <div class="ship-body"></div>
                <div class="ship-cockpit"></div>
                <div class="wing wing-left"></div>
                <div class="wing wing-right"></div>
                <div class="engine-glow"></div>
                <div class="thruster-fire"></div>
            </div>

            <!-- Start Screen Menu -->
            <div id="start-screen" class="overlay">
                <h1>🚀 Space Explorer</h1>
                <p>Select Ship:</p>
                <div id="ship-selector-container" class="ship-selector"></div>

                <p>Select Starting Weapon:</p>
                <div class="weapon-selector">
                    <button class="weapon-btn selected" id="w-single" onclick="selectWeapon('single')">🔫 Single</button>
                    <button class="weapon-btn" id="w-double" onclick="selectWeapon('double')">⚡ Double</button>
                    <button class="weapon-btn" id="w-triple" onclick="selectWeapon('triple')">💥 Triple</button>
                </div>

                <button class="game-btn start-btn" onclick="startGame()">🚀 Start Game</button>
            </div>

            <!-- Pause Modal -->
            <div id="pause-modal" class="overlay hidden">
                <h2>⏸️ Game Paused</h2>
                <div class="menu-btn-group">
                    <button class="game-btn" onclick="togglePause()">▶️ Resume Game</button>
                    <button class="game-btn" onclick="showStartScreen()">🔄 Main Menu</button>
                </div>
            </div>

            <!-- Game Over Overlay -->
            <div id="game-over-overlay" class="overlay hidden">
                <h2>💥 Ship Destroyed!</h2>
                <p>Your Score: <span id="final-score">0</span></p>
                
                <div class="menu-btn-group">
                    <button id="revive-btn" class="game-btn revive-btn" onclick="watchAdToRevive()">🎬 Watch Ad to Revive (+1 ❤️)</button>
                    <button class="game-btn" onclick="showStartScreen()">🔄 Main Menu</button>
                </div>
            </div>

            <!-- Fake Ad Modal Simulation -->
            <div id="ad-modal" class="overlay hidden">
                <h3>📺 Reward Advertisement</h3>
                <p>Watching ad... (<span id="ad-timer">3</span>s)</p>
                <div class="ad-box">
                    <p>🚀 <strong>SPACE EXPLORER PREMIUM</strong> 🚀</p>
                    <p>Upgrade your fleet today!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
